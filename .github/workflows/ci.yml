name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: '1.25'
  GO_PACKAGES: ./foundation/... ./modules/... ./stacks/... ./templates/quickstart/...

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Match the toolchain declared in the root go.mod (1.25).
          # Bumping setup-go to install 1.25 directly avoids GOTOOLCHAIN
          # auto-fetching a partial toolchain that's missing `covdata`,
          # which broke `go test -race -cover` in earlier runs.
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
      - name: Build
        run: go build $GO_PACKAGES
      - name: Test
        run: go test -race -cover $GO_PACKAGES
      - name: Vet
        run: go vet $GO_PACKAGES

  template-nextjs:
    name: template-nextjs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/quickstart-nextjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: templates/quickstart-nextjs/package-lock.json
      - run: npm ci
      - run: npm run verify

  fmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - run: make fmt-check

  tidy:
    name: go mod tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - run: make tidy-check

  purity:
    name: pkg purity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make purity-check

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5
          # install-mode: goinstall builds golangci-lint with the runner's
          # Go (1.25) instead of pulling a binary compiled against an older
          # Go release. Required because Go 1.25 syntax is unrecognised by
          # binaries built with Go 1.24 — yields "go language version (go1.24)
          # used to build golangci-lint is lower than the targeted Go version".
          install-mode: goinstall
          args: --config=${{ github.workspace }}/.golangci.yml ${{ env.GO_PACKAGES }}

# govulncheck — informational only.
  #
  # Reports CVEs in the stdlib + dependency tree but does NOT fail the
  # build. Reason: stdlib CVEs are surfaced for every Go release until
  # the next patch ships and we pull it in via `go-version: '1.25'`,
  # which would make every transient CVE a red CI. Maintainers should
  # eyeball the output on each release and bump deps when applicable.
  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck $GO_PACKAGES
