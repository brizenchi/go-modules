name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: '1.25'

jobs:
  test:
    name: test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - foundation/slog
          - foundation/jwt
          - foundation/httpresp
          - foundation/ginx
          - foundation/config
          - foundation/pgx
          - foundation/rdx
          - auth
          - billing
          - email
          - referral
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Match the toolchain declared in every module's go.mod (1.25).
          # Bumping setup-go to install 1.25 directly avoids GOTOOLCHAIN
          # auto-fetching a partial toolchain that's missing `covdata`,
          # which broke `go test -race -cover` in earlier runs.
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: Build + test
        working-directory: ${{ matrix.module }}
        run: |
          go build ./...
          go test -race -cover ./...
      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

  fmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - run: make fmt-check

  tidy:
    name: go mod tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - run: make tidy-check

  purity:
    name: pkg purity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make purity-check

  lint:
    name: golangci-lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - foundation/slog
          - foundation/jwt
          - foundation/httpresp
          - foundation/ginx
          - foundation/config
          - foundation/pgx
          - foundation/rdx
          - auth
          - billing
          - email
          - referral
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: ${{ matrix.module }}
          args: --config=${{ github.workspace }}/.golangci.yml

# govulncheck — informational only.
  #
  # Reports CVEs in the stdlib + dependency tree but does NOT fail the
  # build. Reason: stdlib CVEs are surfaced for every Go release until
  # the next patch ships and we pull it in via `go-version: '1.25'`,
  # which would make every transient CVE a red CI. Maintainers should
  # eyeball the output on each release and bump deps when applicable.
  vuln:
    name: govulncheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        module:
          - foundation/slog
          - foundation/jwt
          - foundation/httpresp
          - foundation/ginx
          - foundation/config
          - foundation/pgx
          - foundation/rdx
          - auth
          - billing
          - email
          - referral
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - working-directory: ${{ matrix.module }}
        run: govulncheck ./...
